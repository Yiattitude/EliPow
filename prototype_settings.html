<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电荔 Elipow - 设置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0a0a0a',
                        foreground: '#fafafa',
                        primary: '#aa3bff',
                        accent: '#3b82f6',
                        destructive: '#ef4444',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { background-color: #0a0a0a; color: #fafafa; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex h-screen w-full relative">

    <!-- 极简左侧导航栏 (App Shell) -->
    <aside class="w-20 md:w-56 border-r border-white/10 flex flex-col bg-background/50 z-20">
        <div class="h-16 flex items-center justify-center md:justify-start md:px-6 border-b border-white/10">
            <i data-lucide="zap" class="text-primary w-6 h-6"></i>
            <span class="hidden md:block ml-3 font-semibold tracking-widest text-sm">ELIPOW</span>
        </div>
        <nav class="flex-1 py-6 flex flex-col gap-3 px-3">
            <div class="w-full flex items-center justify-center md:justify-start px-0 md:px-3 py-3 rounded-lg text-white/40 hover:bg-white/5 cursor-pointer transition-colors" onclick="window.location.href='prototype.html'">
                <i data-lucide="compass" class="w-5 h-5"></i>
                <span class="hidden md:block ml-3 text-sm font-medium">知识星图</span>
            </div>
            <!-- ... -->
        </nav>
        <div class="p-4 border-t border-white/10">
             <div class="w-full flex items-center justify-center md:justify-start px-0 md:px-3 py-3 rounded-lg bg-white/10 text-white cursor-pointer shadow-sm">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="hidden md:block ml-3 text-sm font-medium">全局设置</span>
            </div>
        </div>
    </aside>

    <!-- 核心工作区 (Settings) -->
    <main class="flex-1 overflow-y-auto p-10 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-primary/5 via-background to-background">
        
        <div class="max-w-3xl mx-auto">
            <h1 class="text-3xl font-bold mb-8">设置</h1>

            <!-- 个人画像管理 -->
            <section class="mb-10">
                <h2 class="text-lg font-semibold mb-4 text-white/90">个人画像管理</h2>
                <div class="glass-panel p-6 rounded-2xl flex flex-col gap-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="font-medium">当前规划</div>
                            <div class="text-xs text-white/50 mt-1">改变规划将触发知识图谱权重的局部重算。</div>
                        </div>
                        <div class="bg-primary/20 text-primary px-3 py-1.5 rounded-lg text-sm border border-primary/30">考研深造</div>
                    </div>
                    
                    <div class="h-px w-full bg-white/10"></div>
                    
                    <div>
                        <div class="font-medium mb-3">最薄弱知识点标签</div>
                        <div class="flex gap-2">
                            <span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-xs text-white/70">变压器等效电路 <i data-lucide="x" class="inline w-3 h-3 ml-1 cursor-pointer"></i></span>
                            <span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-xs text-white/70">三相交流绕组 <i data-lucide="x" class="inline w-3 h-3 ml-1 cursor-pointer"></i></span>
                            <button class="px-3 py-1 bg-transparent border border-white/20 border-dashed rounded-full text-xs text-white/50 hover:text-white transition-colors">+ 添加标签</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- AI 记忆管理 -->
            <section class="mb-10">
                <h2 class="text-lg font-semibold mb-4 text-white/90">AI 记忆与 BKT 管理</h2>
                <div class="glass-panel p-6 rounded-2xl flex flex-col gap-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="font-medium">清除当前学科记忆</div>
                            <div class="text-xs text-white/50 mt-1">将《电机学》的 BKT 掌握度重置为 0，这通常用于您希望重新进行系统性复习时。</div>
                        </div>
                        <button class="bg-destructive/20 text-destructive hover:bg-destructive hover:text-white px-4 py-2 rounded-lg text-sm transition-colors border border-destructive/30">
                            重新测评
                        </button>
                    </div>
                </div>
            </section>

            <!-- 基础配置 -->
            <section>
                <h2 class="text-lg font-semibold mb-4 text-white/90">基础配置</h2>
                <div class="glass-panel p-6 rounded-2xl flex flex-col gap-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="font-medium">视觉主题</div>
                        </div>
                        <select class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white outline-none">
                            <option value="dark">Linear 暗黑 (推荐)</option>
                            <option value="light">极简亮色</option>
                        </select>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
